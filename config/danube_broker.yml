# Danube cluster name
cluster_name: "MY_CLUSTER"

# Broker Services Configuration
broker:
  # Hostname or IP address for all broker services
  host: "0.0.0.0"
  ports:
    # Client connections (producers/consumers)
    client: 6650
    # Admin API
    admin: 50051
    # Raft inter-node gRPC transport
    raft: 7650
    # Prometheus metrics exporter
    prometheus: 9040
  # Optional: advertised addresses for proxy/k8s mode
  # If omitted, bind address (host:ports.client) is used for both broker_url and connect_url
  # advertised_listeners:
  #   # Internal: address reachable inside the cluster (broker identity, inter-broker)
  #   broker_url: "broker-0.danube-broker-headless:6650"
  #   # External: address reachable by external clients via gRPC proxy
  #   connect_url: "danube-proxy.example.com:6650"

# Metadata Store Configuration (Raft — embedded, no external dependency)
# node_id is auto-generated on first boot and persisted in {data_dir}/node_id
meta_store:
  data_dir: "./danube-data/raft"
  # Seed nodes for cluster formation (Raft transport addresses).
  # Empty or omitted = single-node cluster (auto-init, zero config).
  # For multi-node: list ALL initial peers (including this node's raft addr).
  # seed_nodes:
  #   - "0.0.0.0:7650"
  #   - "0.0.0.0:7651"
  #   - "0.0.0.0:7652"

# Namespaces to be created on boot
bootstrap_namespaces:
  - "default"

# Allow producers to auto-create topics when missing
auto_create_topics: true

# Enable TLS on the admin API (default: false).
# Set to true for remote cluster management over untrusted networks.
# When true, uses the same cert/key from auth.tls below.
# admin_tls: false

# Security Configuration
# mode: none — no authentication, no encryption (development/testing only)
# mode: tls  — full security: TLS + JWT for clients, mTLS for inter-broker & Raft
# For production with TLS enabled, see config/danube_broker_secure.yml
auth:
  mode: none
  # tls:
  #   cert_file: "./cert/server-cert.pem"
  #   key_file: "./cert/server-key.pem"
  #   ca_file: "./cert/ca-cert.pem"
  # jwt:
  #   secret_key: "your-secret-key"
  #   issuer: "danube-auth"
  #   expiration_time: 3600
  # super_admins:
  #   - "admin"

# Load Manager Configuration (Automated Proactive Rebalancing)
load_manager:
  # Topic Assignment Strategy: How to assign NEW topics to brokers
  # Options:
  #   - fair: Simple topic count only (predictable, testing-friendly)
  #
  #   - balanced: Multi-factor scoring (RECOMMENDED for production)
  #               Formula: (weighted_topic_load × 0.3) + (CPU × 0.35) + (Memory × 0.35)
  #
  #   - weighted_load: Adaptive smart algorithm (advanced)
  #                    Automatically detects bottleneck resources and prioritizes them
  assignment_strategy: "fair"

  # LoadReport Publishing Interval: How often brokers publish load reports (seconds)
  # - Lower values (5-10s): Faster response, more metadata traffic, better for testing
  # - Higher values (30-60s): Less overhead, suitable for stable production clusters
  # Default: 30 seconds
  load_report_interval_seconds: 30

  # Automated Rebalancing: Proactive optimization of EXISTING topic placement
  rebalancing:
    # Enable/disable automated rebalancing (starts disabled for safety)
    enabled: false

    # Aggressiveness level: Controls how aggressively to optimize cluster balance
    # Options:
    #   - conservative: Fewer moves, only when severely imbalanced (CV > 40%), more stable
    #   - balanced: Moderate optimization (CV > 30%), good for most production clusters
    #   - aggressive: Optimize harder (CV > 20%), more moves, responds faster to changes
    aggressiveness: "balanced"

    # Check frequency: How often to evaluate cluster balance (seconds)
    # Defaults by aggressiveness: conservative=600, balanced=300, aggressive=180
    check_interval_seconds: 300

    # Move limits: Prevent rebalancing storms
    # Rebalancing moves 1 topic per cycle (hardcoded for safety)
    # Max topic moves per hour (rate limiting across all cycles)
    # Defaults by aggressiveness: conservative=5, balanced=10, aggressive=20
    max_moves_per_hour: 10

    # Wait time between individual topic moves (seconds)
    # Defaults by aggressiveness: conservative=120, balanced=60, aggressive=30
    cooldown_seconds: 60

    # Cluster requirements: Minimum brokers needed to enable rebalancing
    # Rebalancing is skipped if cluster has fewer brokers than this
    min_brokers_for_rebalance: 2

    # Topic protection: Don't move topics younger than this (seconds)
    # Prevents moving topics that were just created or recently moved
    min_topic_age_seconds: 300

    # Topic blacklist: Topics matching these patterns will NEVER be rebalanced
    # Supports:
    #   - Exact topic names: /admin/critical-topic
    #   - Namespace wildcards: /system/* (all topics in /system namespace)
    # Examples: ["/system/*", "/admin/critical-topic", "/production/*"]
    blacklist_topics: []

# Storage Configuration
# Controls how reliable topics persist messages.
# Three modes available: local, shared_fs, object_store.
#
# - local:        WAL-only on broker disk. No background export. Best for single-node / dev.
# - shared_fs:    Local WAL + background export to a shared filesystem. Best for on-prem multi-broker.
# - object_store: Local WAL + background export to S3/GCS/Azure Blob. Best for cloud-native multi-broker.
#
# See docs/concepts/persistence.md for full guidance.

storage:
  # Storage mode (required): local | shared_fs | object_store
  mode: local

  # Root directory for per-topic WAL files (required for local; auto-derived for shared_fs/object_store).
  # For shared_fs/object_store, if omitted the broker derives a cache path from meta_store.data_dir.
  local_wal_root: "./danube-data/wal"

  # Prefix for storage metadata keys in the Raft metadata store.
  # Default: "/danube". Change only if running multiple independent clusters on the same Raft group.
  metadata_prefix: "/danube"

  # Local WAL retention: prunes local WAL files after durable segments safely cover them.
  # Most useful in shared_fs and object_store modes where background export runs.
  # In local mode, files are only pruned if proven safely covered by durable metadata.
  local_retention:
    # Delete local WAL files older than this (minutes). Default: 2880 (48 hours).
    time_minutes: 2880
    # Delete oldest local WAL files when total size exceeds this (MB). Default: 20480 (20 GB).
    size_mb: 20480
    # How often to check the retention policy (minutes). Default: 5.
    check_interval_minutes: 5

  # WAL settings: controls file rotation thresholds.
  # Rotation creates new WAL files; sealed files become eligible for export and retention.
  wal:
    rotation:
      # Rotate WAL file when it reaches this size (bytes). Default: 536870912 (512 MB).
      max_bytes: 536870912
      # Rotate WAL file after this many hours (optional, no default).
      # Useful for low-traffic topics to ensure files don't grow indefinitely old.
      # max_hours: 24

    # Advanced WAL tuning (optional). These are rarely needed for most deployments.
    # advanced:
    #   # In-memory replay cache capacity (number of messages).
    #   # Higher = better consumer cache hit rates, more memory usage.
    #   # cache_capacity: 1024
    #
    #   # Background flush settings. Controls how often buffered writes are fsynced to disk.
    #   # This is NOT per-message sync — it's background batch flush cadence.
    #   # file_sync:
    #   #   # Flush interval in milliseconds. Default: 5000 (5s).
    #   #   interval_ms: 5000
    #   #   # Force flush when buffered bytes exceed this. Default: 10485760 (10 MB).
    #   #   max_batch_bytes: 10485760

  # --- Durable backend (required for shared_fs and object_store, not used in local) ---

  # shared_fs durable backend example:
  # durable:
  #   # Shared filesystem directory visible to all brokers (e.g. NFS mount).
  #   # This is NOT the local WAL directory — it's where exported segments are stored.
  #   root: "/mnt/danube-shared-segments"

  # object_store durable backend example (S3):
  # durable:
  #   backend: s3
  #   root: "s3://my-bucket/danube"
  #   region: "us-east-1"
  #   # endpoint: "https://s3.us-east-1.amazonaws.com"  # optional, for custom endpoints / MinIO
  #   # access_key: "<access-key>"                       # prefer env vars or IAM roles in production
  #   # secret_key: "<secret-key>"
  #   # profile: "default"                               # AWS profile name (optional)
  #   # role_arn: "arn:aws:iam::..."                      # IAM role to assume (optional)
  #   # session_token: "<token>"                          # temporary session token (optional)
  #   # anonymous: false                                  # anonymous access (optional, for public buckets)
  #   # virtual_host_style: false                         # S3 virtual-hosted-style URLs (optional)

  # object_store durable backend example (GCS):
  # durable:
  #   backend: gcs
  #   root: "gcs://my-bucket/danube"
  #   # project: "my-gcp-project"
  #   # credentials_path: "/path/to/credentials.json"
  #   # credentials_json: '{"type":"service_account",...}'

  # object_store durable backend example (Azure Blob):
  # durable:
  #   backend: azblob
  #   root: "my-container/danube"
  #   # endpoint: "https://<account>.blob.core.windows.net"
  #   # account_name: "<account-name>"
  #   # account_key: "<account-key>"

# Dispatch Configuration
# Controls how reliable subscriptions deliver messages to consumers.
dispatch:
  # Maximum unacknowledged messages per subscription (pipelining depth).
  # Higher values increase throughput at the cost of memory and redelivery scope.
  # Per-subscription override available via admin API (set-dispatch-config).
  # Default: 10. Range: 1–10000.
  max_unacked_messages: 10

# Broker policies, that can be overwritten by namespace / topic policies
policies:
  # Limits the maximum number of producers that can simultaneously publish messages to a specific topic.
  # Default is 0, unlimited.
  max_producers_per_topic: 0

  # Limits the maximum number of subscriptions that can be created on the topic.
  # Default is 0, unlimited.
  max_subscriptions_per_topic: 0

  # Limits the maximum number of consumers that can simultaneously consume messages from a specific topic.
  # Default is 0, unlimited.
  max_consumers_per_topic: 0

  # Limits the maximum number of consumers that can simultaneously use a single subscription on a topic.
  # Default is 0, unlimited.
  max_consumers_per_subscription: 0

  # Defines the Max publish rate (number of messages and/or bytes per second) for producers publishing to the topic.
  # Default is 0, unlimited.
  max_publish_rate: 0

  # Defines the dispatch rate for each subscription on the topic.
  # Default is 0, unlimited.
  max_subscription_dispatch_rate: 0

  # Limits the maximum size of a single message that can be published to the topic.
  # Default is 10 MB
  max_message_size: 10485760 # in bytes which means 10 MB
