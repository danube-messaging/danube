# Danube Edge Configuration
#
# Unified configuration for the edge broker covering:
# - Edge identity and cluster connectivity
# - WAL-to-cluster replication batching
# - MQTT gateway (listener, topic mappings, ingestion batching)

edge:
  # Unique name for this edge broker
  edge_name: "edge1"
  # Cluster broker URL for replication
  cluster_url: "http://cluster-broker:6650"
  # Authentication token (can be overridden via --edge-token CLI arg)
  token: ""

replicator:
  # Number of messages per batch before sending to cluster
  batch_size: 100
  # Maximum time (ms) to wait before sending a partial batch
  batch_timeout_ms: 1000

mqtt:
  # TCP listener address for MQTT connections
  listener: "0.0.0.0:1883"

  # Topic mapping rules (evaluated in order, first match wins).
  #
  # Supported MQTT wildcards:
  #   +  — single-level wildcard (matches one path segment)
  #   #  — multi-level wildcard (matches remainder of path)
  #
  # `extract_attributes` maps wildcard captures ($1, $2, ...) to
  # Danube StreamMessage attributes. These propagate to cluster consumers.
  topic_mappings:
    - mqtt_pattern: "device/+/telemetry"
      danube_topic: "/default/telemetry"
      extract_attributes:
        device_id: "$1"

    - mqtt_pattern: "sensors/+/+"
      danube_topic: "/default/sensors"
      extract_attributes:
        sensor_type: "$1"
        measurement: "$2"

    # Catch-all: any unmatched MQTT topic goes here
    - mqtt_pattern: "#"
      danube_topic: "/default/mqtt"

  # Ingestion batching configuration.
  # Messages are buffered per-topic and flushed to the local WAL in bulk.
  ingestion:
    # Flush when this many messages accumulate for a single topic
    batch_size: 100
    # Flush after this timeout (ms) even if batch_size is not reached
    batch_timeout_ms: 500
