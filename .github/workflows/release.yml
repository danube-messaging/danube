name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev protobuf-compiler

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Upload Linux binaries
        uses: actions/upload-artifact@v4
        with:
          name: danube-binaries-linux
          path: |
            target/x86_64-unknown-linux-gnu/release/danube-broker
            target/x86_64-unknown-linux-gnu/release/danube-cli
            target/x86_64-unknown-linux-gnu/release/danube-admin

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install pkg-config openssl protobuf

      - name: Set up Rust for Apple Silicon
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build for Apple Silicon
        run: cargo build --release --target aarch64-apple-darwin

      - name: Upload MacOS Apple Silicon binaries
        uses: actions/upload-artifact@v4
        with:
          name: danube-binaries-macos
          path: |
            target/aarch64-apple-darwin/release/danube-broker
            target/aarch64-apple-darwin/release/danube-cli
            target/aarch64-apple-darwin/release/danube-admin

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          choco install protoc
          
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build for Windows
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload Windows binaries
        uses: actions/upload-artifact@v4
        with:
          name: danube-binaries-windows
          path: |
            target/x86_64-pc-windows-msvc/release/danube-broker.exe
            target/x86_64-pc-windows-msvc/release/danube-cli.exe
            target/x86_64-pc-windows-msvc/release/danube-admin.exe

  docker-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Broker
        id: meta-broker
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/danube-broker
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=true

      - name: Build and push Danube Broker image (${{ matrix.arch }})
        uses: docker/build-push-action@v5
        with:
          context: .
          target: broker
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/danube-broker:${{ github.ref_name }}-${{ matrix.arch }}
            ghcr.io/${{ github.repository_owner }}/danube-broker:latest-${{ matrix.arch }}
          labels: ${{ steps.meta-broker.outputs.labels }}
          cache-from: type=gha,scope=broker-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=broker-${{ matrix.arch }}

      - name: Extract metadata for CLI
        id: meta-cli
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/danube-cli
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=true

      - name: Build and push Danube CLI image (${{ matrix.arch }})
        uses: docker/build-push-action@v5
        with:
          context: .
          target: cli
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/danube-cli:${{ github.ref_name }}-${{ matrix.arch }}
            ghcr.io/${{ github.repository_owner }}/danube-cli:latest-${{ matrix.arch }}
          labels: ${{ steps.meta-cli.outputs.labels }}
          cache-from: type=gha,scope=cli-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=cli-${{ matrix.arch }}

      - name: Extract metadata for Danube Admin
        id: meta-admin
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/danube-admin
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=true

      - name: Build and push Danube Admin image (${{ matrix.arch }})
        uses: docker/build-push-action@v5
        with:
          context: .
          target: admin
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/danube-admin:${{ github.ref_name }}-${{ matrix.arch }}
            ghcr.io/${{ github.repository_owner }}/danube-admin:latest-${{ matrix.arch }}
          labels: ${{ steps.meta-admin.outputs.labels }}
          cache-from: type=gha,scope=admin-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=admin-${{ matrix.arch }}

  docker-manifest:
    needs: docker-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          BROKER="ghcr.io/${{ github.repository_owner }}/danube-broker"
          CLI="ghcr.io/${{ github.repository_owner }}/danube-cli"
          ADMIN="ghcr.io/${{ github.repository_owner }}/danube-admin"

          docker buildx imagetools create \
            -t ${BROKER}:${TAG} \
            -t ${BROKER}:latest \
            ${BROKER}:${TAG}-amd64 \
            ${BROKER}:${TAG}-arm64

          docker buildx imagetools create \
            -t ${CLI}:${TAG} \
            -t ${CLI}:latest \
            ${CLI}:${TAG}-amd64 \
            ${CLI}:${TAG}-arm64

          docker buildx imagetools create \
            -t ${ADMIN}:${TAG} \
            -t ${ADMIN}:latest \
            ${ADMIN}:${TAG}-amd64 \
            ${ADMIN}:${TAG}-arm64

  release:
    needs: [build-linux, build-macos, build-windows, docker-manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
      deployments: read
      issues: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux binaries
        uses: actions/download-artifact@v4
        with:
          name: danube-binaries-linux
          path: artifacts/linux/

      - name: Download MacOS binaries
        uses: actions/download-artifact@v4
        with:
          name: danube-binaries-macos
          path: artifacts/macos/

      - name: Download Windows binaries
        uses: actions/download-artifact@v4
        with:
          name: danube-binaries-windows
          path: artifacts/windows/

      - name: Prepare release assets
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p release

          # --- Linux (x86_64) ---
          for bin in danube-broker danube-cli danube-admin; do
            ARCHIVE="${bin}-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
            chmod +x "artifacts/linux/${bin}"
            tar czf "release/${ARCHIVE}" -C artifacts/linux "${bin}"
          done

          # --- macOS (Apple Silicon) ---
          for bin in danube-broker danube-cli danube-admin; do
            ARCHIVE="${bin}-${VERSION}-aarch64-apple-darwin.tar.gz"
            chmod +x "artifacts/macos/${bin}"
            tar czf "release/${ARCHIVE}" -C artifacts/macos "${bin}"
          done

          # --- Windows (x86_64) ---
          for bin in danube-broker danube-cli danube-admin; do
            ARCHIVE="${bin}-${VERSION}-x86_64-pc-windows-msvc.zip"
            (cd artifacts/windows && zip -q "../../release/${ARCHIVE}" "${bin}.exe")
          done

          # Generate checksums
          cd release
          sha256sum * > checksums.txt

      - name: Extract release notes from CHANGELOG.md
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          test -f CHANGELOG.md || { echo "CHANGELOG.md not found"; exit 1; }
          # Extract block between markers and drop the markers themselves
          sed -n '/<!-- '"${TAG}"' START -->/,/<!-- '"${TAG}"' END -->/p' CHANGELOG.md \
            | sed '1d;$d' > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No notes found for ${TAG} in CHANGELOG.md" >&2
            exit 1
          fi

      - name: Compose release body
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          cat > RELEASE_STATIC.md <<EOF
          ## Release Notes - Binaries

          ## Danube Broker:
          - **Linux (x86_64)**: [danube-broker-${VERSION}-x86_64-unknown-linux-gnu.tar.gz](https://github.com/${{ github.repository }}/releases/download/${VERSION}/danube-broker-${VERSION}-x86_64-unknown-linux-gnu.tar.gz)
          - **macOS (Apple Silicon)**: [danube-broker-${VERSION}-aarch64-apple-darwin.tar.gz](https://github.com/${{ github.repository }}/releases/download/${VERSION}/danube-broker-${VERSION}-aarch64-apple-darwin.tar.gz)
          - **Windows (x86_64)**: [danube-broker-${VERSION}-x86_64-pc-windows-msvc.zip](https://github.com/${{ github.repository }}/releases/download/${VERSION}/danube-broker-${VERSION}-x86_64-pc-windows-msvc.zip)

          ## Client CLI:
          - **Linux (x86_64)**: [danube-cli-${VERSION}-x86_64-unknown-linux-gnu.tar.gz](https://github.com/${{ github.repository }}/releases/download/${VERSION}/danube-cli-${VERSION}-x86_64-unknown-linux-gnu.tar.gz)
          - **macOS (Apple Silicon)**: [danube-cli-${VERSION}-aarch64-apple-darwin.tar.gz](https://github.com/${{ github.repository }}/releases/download/${VERSION}/danube-cli-${VERSION}-aarch64-apple-darwin.tar.gz)
          - **Windows (x86_64)**: [danube-cli-${VERSION}-x86_64-pc-windows-msvc.zip](https://github.com/${{ github.repository }}/releases/download/${VERSION}/danube-cli-${VERSION}-x86_64-pc-windows-msvc.zip)

          ## Admin (CLI + Server):
          - **Linux (x86_64)**: [danube-admin-${VERSION}-x86_64-unknown-linux-gnu.tar.gz](https://github.com/${{ github.repository }}/releases/download/${VERSION}/danube-admin-${VERSION}-x86_64-unknown-linux-gnu.tar.gz)
          - **macOS (Apple Silicon)**: [danube-admin-${VERSION}-aarch64-apple-darwin.tar.gz](https://github.com/${{ github.repository }}/releases/download/${VERSION}/danube-admin-${VERSION}-aarch64-apple-darwin.tar.gz)
          - **Windows (x86_64)**: [danube-admin-${VERSION}-x86_64-pc-windows-msvc.zip](https://github.com/${{ github.repository }}/releases/download/${VERSION}/danube-admin-${VERSION}-x86_64-pc-windows-msvc.zip)
 
          ## Checksums:
          - **SHA256**: [checksums.txt](https://github.com/${{ github.repository }}/releases/download/${VERSION}/checksums.txt)
          
          ## Docker Images:
          - **Danube Broker**: \`ghcr.io/${{ github.repository_owner }}/danube-broker:${VERSION}\`
          - **Danube CLI**: \`ghcr.io/${{ github.repository_owner }}/danube-cli:${VERSION}\`
          - **Danube Admin**: \`ghcr.io/${{ github.repository_owner }}/danube-admin:${VERSION}\`
          
          ### Quick Start with Docker:
          \`\`\`bash
          # Run Danube Broker
          docker run -p 6650:6650 ghcr.io/${{ github.repository_owner }}/danube-broker:${VERSION}
          
          # Use Danube CLI (client operations)
          docker run --rm ghcr.io/${{ github.repository_owner }}/danube-cli:${VERSION} danube-cli produce --help
          
          # Use Danube Admin CLI (admin commands)
          docker run --rm ghcr.io/${{ github.repository_owner }}/danube-admin:${VERSION} brokers list
          
          # Run Danube Admin Server (HTTP API for UI)
          docker run -p 8080:8080 ghcr.io/${{ github.repository_owner }}/danube-admin:${VERSION} serve \\
            --broker-endpoint host.docker.internal:50051 \\
            --prometheus-url http://host.docker.internal:9090
          
          # Use with Docker Compose
          curl -O https://raw.githubusercontent.com/${{ github.repository }}/main/docker/quickstart/docker-compose.yml
          docker-compose up -d
          \`\`\`

          ### Install from Archive:
          \`\`\`bash
          # Linux
          curl -LsS https://github.com/${{ github.repository }}/releases/download/${VERSION}/danube-broker-${VERSION}-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv danube-broker /usr/local/bin/

          # macOS (Apple Silicon)
          curl -LsS https://github.com/${{ github.repository }}/releases/download/${VERSION}/danube-broker-${VERSION}-aarch64-apple-darwin.tar.gz | tar xz
          sudo mv danube-broker /usr/local/bin/

          # Windows (PowerShell)
          Invoke-WebRequest -Uri https://github.com/${{ github.repository }}/releases/download/${VERSION}/danube-broker-${VERSION}-x86_64-pc-windows-msvc.zip -OutFile danube-broker.zip
          Expand-Archive danube-broker.zip -DestinationPath .
          Move-Item danube-broker.exe C:\\Windows\\System32\\
          \`\`\`
          
          ### Verify Downloads:
          \`\`\`bash
          curl -LO https://github.com/${{ github.repository }}/releases/download/${VERSION}/checksums.txt
          sha256sum -c checksums.txt --ignore-missing
          \`\`\`
          EOF
          # Combine CHANGELOG section + static info
          cat RELEASE_NOTES.md RELEASE_STATIC.md > RELEASE_BODY.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: release/*
          body_path: RELEASE_BODY.md

