name: Tiered Storage E2E

on:
  pull_request:
    paths:
      - 'danube-persistent-storage/**'
      - 'danube-broker/**'
      - 'config/for_tests/danube_broker_write_buffer.yml'
      - '.github/workflows/write-buffer-e2e.yml'
  workflow_dispatch:

jobs:
  tiered_storage_e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      valkey:
        image: valkey/valkey:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq netcat-openbsd protobuf-compiler redis-tools

      - name: Create certificate files
        run: |
          mkdir -p ./cert
          printf "%s" "${{ secrets.CERT_FILE }}" > ./cert/server-cert.pem
          printf "%s" "${{ secrets.KEY_FILE }}" > ./cert/server-key.pem
          printf "%s" "${{ secrets.CA_FILE }}" > ./cert/ca-cert.pem

      - name: Verify Valkey is reachable
        run: |
          for attempt in $(seq 1 10); do
            if nc -zv 127.0.0.1 6379 2>/dev/null; then
              echo "Valkey is ready on port 6379."
              break
            elif [ $attempt -eq 10 ]; then
              echo "ERROR: Valkey failed to start."
              exit 1
            fi
            echo "Waiting for Valkey... ($attempt/10)"
            sleep 2
          done

      - name: Build workspace (release)
        run: cargo build --workspace --release

      # =====================================================================
      # Phase 1: Integration tests (StorageFactory → TieredStorage → Valkey)
      # =====================================================================
      - name: "Phase 1: Run write buffer integration tests"
        env:
          RUST_BACKTRACE: 1
        run: |
          echo "=== Running write buffer integration tests ==="
          cargo test --release -p danube-persistent-storage --test write_buffer_valkey -- --ignored --test-threads=1 --nocapture

      - name: "Phase 1b: Run warm tier read tests"
        env:
          RUST_BACKTRACE: 1
        run: |
          echo "=== Running warm tier read path tests ==="
          cargo test --release -p danube-persistent-storage --test warm_tier_read -- --ignored --test-threads=1 --nocapture

      # =====================================================================
      # Phase 2: Broker E2E — produce messages with write buffer enabled
      # =====================================================================
      - name: "Phase 2: Start broker with write buffer config"
        env:
          RUST_LOG: info,openraft::replication=off,openraft=error
        run: |
          mkdir -p temp danube-data

          ./target/release/danube-broker \
            --config-file ./config/for_tests/danube_broker_write_buffer.yml \
            --broker-addr 0.0.0.0:6650 \
            --admin-addr 0.0.0.0:50051 \
            --raft-addr 0.0.0.0:7650 \
            --data-dir ./danube-data/raft-1 \
            --prom-exporter 0.0.0.0:9040 \
            > temp/broker.log 2>&1 &
          echo $! > temp/broker.pid

          for attempt in $(seq 1 20); do
            if nc -zv 127.0.0.1 6650 2>/dev/null; then
              echo "Broker is ready on port 6650."
              break
            elif [ $attempt -eq 20 ]; then
              echo "ERROR: Broker failed to start."
              cat temp/broker.log
              exit 1
            fi
            echo "Waiting for broker to start... ($attempt/20)"
            sleep 3
          done

      - name: "Phase 2: Produce messages with write buffer"
        run: |
          CLI_BIN=./target/release/danube-cli

          # Produce 10 messages through the broker (goes through TieredStorage → WAL + Valkey)
          # --reliable creates the topic with Reliable dispatch (auto_create_topics: true)
          # which enables storage (TieredStorage with hot WAL + warm Valkey double-write)
          $CLI_BIN produce \
            -s http://127.0.0.1:6650 \
            -t /default/wb-crash-test \
            -m "crash-recovery-test-message" \
            -c 10 \
            --reliable
          echo "✓ Produced 10 messages (reliable dispatch)"
          sleep 2

      - name: "Phase 2: Verify double-write to Valkey"
        run: |
          echo "=== Verifying Valkey has buffered messages ==="

          # Check that Valkey has the stream with entries
          ENTRY_COUNT=$(redis-cli -h 127.0.0.1 -p 6379 XLEN "/topics/default/wb-crash-test/stream" 2>/dev/null || echo "0")
          echo "Valkey stream entry count: $ENTRY_COUNT"

          if [ "$ENTRY_COUNT" -gt 0 ] 2>/dev/null; then
            echo "✓ Valkey has $ENTRY_COUNT buffered messages"
          else
            echo "✗ FAIL: Valkey has no buffered messages — double-write may not be working"
            echo ""
            echo "=== Broker log (write buffer lines) ==="
            grep -i "valkey\|write.buffer\|TieredStorage" temp/broker.log | tail -20 || true
            echo ""
            echo "=== All Valkey keys ==="
            redis-cli -h 127.0.0.1 -p 6379 KEYS "*" 2>/dev/null || true
            exit 1
          fi

          echo "✓ Phase 2 complete: broker with write buffer produced and verified"

      # =====================================================================
      # Phase 3: Crash simulation — kill broker, delete WAL, restart
      # =====================================================================
      - name: "Phase 3: Simulate crash — kill broker and delete WAL"
        run: |
          BROKER_PID=$(cat temp/broker.pid)
          echo "Killing broker (pid=$BROKER_PID)..."
          kill -9 $BROKER_PID
          sleep 2
          echo "✓ Broker killed"

          # Delete WAL directory to simulate disk loss
          echo "Deleting WAL directory..."
          rm -rf ./danube-data/wal
          echo "✓ WAL directory deleted"

          # Verify WAL is gone
          if [ -d ./danube-data/wal ]; then
            echo "ERROR: WAL directory still exists"
            exit 1
          fi
          echo "✓ Confirmed WAL is gone — only Valkey has the buffered data"

      - name: "Phase 3: Restart broker (same config, no WAL)"
        env:
          RUST_LOG: info,openraft::replication=off,openraft=error
        run: |
          echo "Restarting broker with same config (WAL deleted)..."
          ./target/release/danube-broker \
            --config-file ./config/for_tests/danube_broker_write_buffer.yml \
            --broker-addr 0.0.0.0:6650 \
            --admin-addr 0.0.0.0:50051 \
            --raft-addr 0.0.0.0:7650 \
            --data-dir ./danube-data/raft-1 \
            --prom-exporter 0.0.0.0:9040 \
            >> temp/broker.log 2>&1 &
          echo $! > temp/broker.pid

          for attempt in $(seq 1 20); do
            if nc -zv 127.0.0.1 6650 2>/dev/null; then
              echo "Broker restarted and ready on port 6650."
              break
            elif [ $attempt -eq 20 ]; then
              echo "ERROR: Broker failed to restart."
              tail -50 temp/broker.log
              exit 1
            fi
            echo "Waiting for broker to restart... ($attempt/20)"
            sleep 3
          done

          # Produce 1 message to trigger lazy topic initialization → recovery
          # Topics are initialized on-demand when first accessed, not at broker
          # startup. This produce triggers for_topic() → get_or_create_wal() →
          # resolve_recovery_start() → ValkeyWriteBuffer replay.
          echo "Triggering topic recovery by producing a message..."
          sleep 3
          ./target/release/danube-cli produce \
            -s http://127.0.0.1:6650 \
            -t /default/wb-crash-test \
            -m "post-crash-trigger" \
            -c 1 \
            --reliable
          echo "✓ Topic accessed — recovery should have triggered"
          sleep 2

      - name: "Phase 3: Verify crash recovery from Valkey"
        run: |
          echo "=== Verifying crash recovery ==="
          PASS=true

          # 1. Check recovery source was ValkeyWriteBuffer
          if grep -q "ValkeyWriteBuffer" temp/broker.log; then
            echo "✓ Recovery source: ValkeyWriteBuffer"
          else
            echo "✗ FAIL: Recovery source was NOT ValkeyWriteBuffer"
            PASS=false
          fi

          # 2. Check that messages were downloaded from Valkey
          if grep -q "downloaded stream for WAL replay" temp/broker.log; then
            echo "✓ Messages downloaded from Valkey"
            grep "downloaded stream" temp/broker.log
          else
            echo "✗ FAIL: No stream download log found"
            PASS=false
          fi

          # 3. Check that messages were replayed into WAL
          if grep -q "valkey recovery: replayed buffered messages into WAL" temp/broker.log; then
            echo "✓ Messages replayed into WAL"
            grep "replayed buffered messages" temp/broker.log
          else
            echo "✗ FAIL: No WAL replay log found"
            PASS=false
          fi

          echo ""
          echo "=== Recovery-related broker log lines ==="
          grep -i "recovery\|replay\|ValkeyWriteBuffer" temp/broker.log | tail -20 || true

          echo ""
          if [ "$PASS" = true ]; then
            echo "✓ Phase 3 complete: crash recovery with WAL replay verified"
          else
            echo "✗ Phase 3 FAILED: see log lines above"
            exit 1
          fi

      # =====================================================================
      # Phase 4: Post-recovery consume — verify messages are readable E2E
      # =====================================================================
      - name: "Phase 4: Consume recovered messages"
        run: |
          CLI_BIN=./target/release/danube-cli
          echo "=== Verifying recovered messages are consumable ==="

          # Consume with a timeout — the consumer streams forever, so we
          # capture output for a few seconds and count the delivered lines.
          timeout 10s $CLI_BIN consume \
            -s http://127.0.0.1:6650 \
            -t /default/wb-crash-test \
            -n recovery-verifier \
            -m recovery-verify-sub \
            --sub-type exclusive \
            > temp/consume_output.txt 2>&1 || true

          echo "--- Consumer output ---"
          cat temp/consume_output.txt
          echo ""

          # Count received messages (each message prints "Received" line)
          MSG_COUNT=$(grep -c "Received" temp/consume_output.txt || echo "0")
          echo "Messages consumed after recovery: $MSG_COUNT"

          if [ "$MSG_COUNT" -ge 1 ]; then
            echo "✓ Phase 4 complete: recovered messages are readable ($MSG_COUNT consumed)"
          else
            echo "✗ FAIL: No messages consumed after recovery"
            echo ""
            echo "=== Broker log (last 30 lines) ==="
            tail -30 temp/broker.log || true
            exit 1
          fi

      # =====================================================================
      # Final summary
      # =====================================================================
      - name: "Final: All phases passed"
        run: |
          echo "========================================="
          echo "  Tiered Storage E2E — ALL TESTS PASSED"
          echo "========================================="
          echo ""
          echo "Phase 1: Integration tests              — PASSED"
          echo "  - StorageFactory → TieredStorage → Valkey"
          echo "  - Batch append, read delegation, offset continuity"
          echo "  - ValkeyClient CRUD operations"
          echo "  - Crash recovery: WAL replay from Valkey"
          echo "  - Warm tier read: data served from Valkey after local WAL retention"
          echo ""
          echo "Phase 2: Broker with write buffer        — PASSED"
          echo "  - Broker started with write_buffer config"
          echo "  - Messages produced via CLI → double-written to WAL + Valkey"
          echo "  - Valkey stream verified with XLEN"
          echo ""
          echo "Phase 3: Crash recovery from Valkey      — PASSED"
          echo "  - Broker killed (SIGKILL), WAL deleted"
          echo "  - Broker restarted, topic accessed"
          echo "  - Recovery: downloaded stream from Valkey"
          echo "  - Recovery: replayed buffered messages into fresh WAL"
          echo ""
          echo "Phase 4: Post-recovery consume           — PASSED"
          echo "  - Consumer connected to recovered topic"
          echo "  - Messages readable end-to-end after crash recovery"

      - name: Print broker logs on failure
        if: failure()
        run: |
          echo '--- broker.log (last 100 lines) ---'
          tail -100 temp/broker.log || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tiered-storage-e2e-logs
          path: |
            temp/broker.log
            temp/consume_output.txt

      - name: Stop brokers
        if: always()
        run: |
          pkill -f danube-broker || true
